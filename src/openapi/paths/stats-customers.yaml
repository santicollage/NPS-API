get:
  summary: Obtener estadísticas de clientes
  description: Devuelve métricas sobre los clientes registrados, nuevos del mes y recurrentes.
  tags:
    - Stats
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Estadísticas obtenidas correctamente
      content:
        application/json:
          schema:
            $ref: '../schemas/stats.yaml#/CustomerStats'
    '401':
      description: No autenticado
    '403':
      description: No autorizado (solo administradores)
    '500':
      description: Error del servidor
