get:
  summary: Obtener resumen general de estadísticas
  description: Devuelve métricas generales como ventas totales, pedidos, ticket promedio, clientes totales, tasa de conversión y tiempo promedio de compra.
  tags:
    - Stats
  security:
    - bearerAuth: []
  parameters:
    - in: query
      name: from
      schema:
        type: string
        format: date
      description: Fecha de inicio (YYYY-MM-DD)
    - in: query
      name: to
      schema:
        type: string
        format: date
      description: Fecha de fin (YYYY-MM-DD)
  responses:
    '200':
      description: Resumen obtenido correctamente
      content:
        application/json:
          schema:
            $ref: '../schemas/stats.yaml#/StatsSummary'
    '401':
      description: No autenticado
    '403':
      description: No autorizado (solo administradores)
    '500':
      description: Error del servidor
