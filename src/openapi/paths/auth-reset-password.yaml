post:
  summary: Restablecer contraseña
  description: Permite cambiar la contraseña utilizando un token válido.
  tags:
    - Auth
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - token
            - newPassword
          properties:
            token:
              type: string
              description: Token recibido en el correo
              example: 3982472...
            newPassword:
              type: string
              format: password
              minLength: 6
              example: NuevaContrasena123!
  responses:
    '200':
      description: Contraseña actualizada correctamente
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Password has been reset successfully.
    '400':
      description: Token inválido, expirado o datos incorrectos
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/ErrorResponse'
