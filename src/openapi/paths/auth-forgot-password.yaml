post:
  summary: Solicitar restablecimiento de contraseña
  description: Envía un correo con un enlace para restablecer la contraseña si el correo existe en el sistema.
  tags:
    - Auth
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
          properties:
            email:
              type: string
              format: email
              example: usuario@example.com
  responses:
    '200':
      description: Solicitud procesada correctamente (se envía correo si existe el usuario)
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: If the email exists, a password reset link has been sent.
    '400':
      description: Datos inválidos
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/ErrorResponse'
    '429':
      description: Demasiadas solicitudes
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/ErrorResponse'
